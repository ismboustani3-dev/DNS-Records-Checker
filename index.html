<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNS Pro Checker</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:
    radial-gradient(circle at top,#1e3a8a55,transparent 30%),
    radial-gradient(circle at bottom,#7c3aed55,transparent 30%),
    #050816;
  color:white;
  min-height:100vh;
}

.container{
  width:95%;
  max-width:1500px;
  margin:auto;
  padding:30px 0;
}

.title{
  font-size:52px;
  font-weight:900;
  background:linear-gradient(to right,#fff,#60a5fa,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:#94a3b8;
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:25px;
}

.card{
  background:rgba(15,23,42,.75);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  backdrop-filter:blur(12px);
}

.left{
  padding:20px;
}

textarea{
  width:100%;
  height:230px;
  background:#020617;
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;
  padding:15px;
  color:white;
  outline:none;
}

.option{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:rgba(255,255,255,.03);
  border-radius:12px;
}

.switch{
  width:50px;
  height:26px;
  position:relative;
}

.switch input{display:none;}

.slider{
  position:absolute;
  inset:0;
  background:#1e293b;
  border-radius:20px;
  cursor:pointer;
}

.slider::before{
  content:'';
  width:20px;
  height:20px;
  background:white;
  position:absolute;
  top:3px;
  left:3px;
  border-radius:50%;
  transition:.3s;
}

.switch input:checked + .slider{
  background:#6366f1;
}

.switch input:checked + .slider::before{
  transform:translateX(24px);
}

.btn{
  width:100%;
  margin-top:18px;
  padding:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.box{
  padding:18px;
  background:rgba(255,255,255,.03);
  border-radius:14px;
  text-align:center;
}

.box h2{
  font-size:30px;
}

.right{
  padding:20px;
}

.progress{
  height:10px;
  background:#0f172a;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:15px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(to right,#2563eb,#8b5cf6);
}

.actions{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.smallbtn{
  padding:10px 14px;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  color:white;
  border-radius:10px;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  border-top:1px solid rgba(255,255,255,.05);
  font-size:13px;
}

.domain{
  font-weight:700;
  font-size:16px;
}

.ok{color:#4ade80;}
.err{color:#f87171;}

</style>
</head>

<body>

<div class="container">

<h1 class="title">DNS PRO CHECKER</h1>
<p class="subtitle">SPF • MX • DMARC • DKIM Scanner</p>

<div class="grid">

<!-- LEFT -->
<div class="card left">

<textarea id="domains">google.com
facebook.com
github.com</textarea>

<div class="option">
<span>SPF</span>
<label class="switch">
<input type="checkbox" id="spf" checked>
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>MX</span>
<label class="switch">
<input type="checkbox" id="mx" checked>
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>DMARC</span>
<label class="switch">
<input type="checkbox" id="dmarc" checked>
<span class="slider"></span>
</label>
</div>

<button class="btn" onclick="scan()">SCAN DOMAINS</button>

<div class="stats">
<div class="box">
<h2 id="total">0</h2>
<p>Total</p>
</div>
<div class="box">
<h2 id="ok">0</h2>
<p>OK</p>
</div>
</div>

</div>

<!-- RIGHT -->
<div class="card right">

<div class="progress">
<div class="fill" id="fill"></div>
</div>

<div class="actions">
<button class="smallbtn" onclick="copy()">Copy</button>
<button class="smallbtn" onclick="csv()">CSV</button>
</div>

<table>
<thead>
<tr>
<th>Domain</th>
<th>SPF</th>
<th>MX</th>
<th>DMARC</th>
<th>Status</th>
</tr>
</thead>

<tbody id="res"></tbody>
</table>

</div>

</div>

</div>

<script>

const res = document.getElementById("res");
const fill = document.getElementById("fill");
const total = document.getElementById("total");
const ok = document.getElementById("ok");

async function dns(name,type){
try{
let r = await fetch(`https://dns.google/resolve?name=${name}&type=${type}`);
let j = await r.json();
return j.Answer || [];
}catch(e){return [];}
}

async function scan(){

res.innerHTML = "";

let domains = document.getElementById("domains")
.value.split("\n").map(x=>x.trim()).filter(Boolean);

total.innerText = domains.length;

let success = 0;

for(let i=0;i<domains.length;i++){

let d = domains[i];

fill.style.width = ((i+1)/domains.length*100)+"%";

let spf="-",mx="-",dmarc="-";
let status="ERR";

if(document.getElementById("spf").checked){
let t = await dns(d,"TXT");
let f = t.find(x=>x.data.includes("v=spf1"));
if(f) spf="YES";
}

if(document.getElementById("mx").checked){
let m = await dns(d,"MX");
if(m.length) mx="YES";
}

if(document.getElementById("dmarc").checked){
let dm = await dns("_dmarc."+d,"TXT");
let f = dm.find(x=>x.data.includes("v=DMARC1"));
if(f) dmarc="YES";
}

if(spf==="YES"||mx==="YES"||dmarc==="YES"){
status="OK";
success++;
}

ok.innerText = success;

let tr = document.createElement("tr");

tr.innerHTML = `
<td><div class="domain">${d}</div></td>
<td>${spf}</td>
<td>${mx}</td>
<td>${dmarc}</td>
<td class="${status==="OK"?"ok":"err"}">${status}</td>
`;

res.appendChild(tr);
}
}

function copy(){
let txt="";
document.querySelectorAll("#res tr").forEach(r=>{
txt+=r.innerText+"\n";
});
navigator.clipboard.writeText(txt);
alert("Copied");
}

function csv(){
let csv="Domain,SPF,MX,DMARC,Status\n";
document.querySelectorAll("#res tr").forEach(r=>{
let c=[...r.children].map(x=>x.innerText).join(",");
csv+=c+"\n";
});
let b=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="dns.csv";
a.click();
}

</script>

</body>
</html>
