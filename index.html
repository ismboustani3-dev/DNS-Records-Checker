<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DNS Records Checker Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at top left,#1e3a8a55,transparent 25%),
    radial-gradient(circle at top right,#7c3aed55,transparent 25%),
    linear-gradient(135deg,#020617,#0f172a,#111827);
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

.container{
  width:95%;
  max-width:1550px;
  margin:auto;
  padding:35px 0;
}

.top{
  margin-bottom:30px;
}

.title{
  font-size:60px;
  font-weight:900;
  background:linear-gradient(to right,#fff,#60a5fa,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  margin-top:10px;
  color:#94a3b8;
  font-size:18px;
}

.grid{
  display:grid;
  grid-template-columns:400px 1fr;
  gap:25px;
}

.card{
  background:rgba(15,23,42,.75);
  border:1px solid rgba(255,255,255,.08);
  border-radius:26px;
  backdrop-filter:blur(14px);
  box-shadow:
    0 0 20px rgba(59,130,246,.15),
    0 0 50px rgba(139,92,246,.08);
}

.left-panel{
  padding:25px;
}

.label{
  margin-bottom:14px;
  color:#cbd5e1;
  font-size:15px;
}

textarea{
  width:100%;
  height:260px;
  background:#020617;
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:18px;
  resize:none;
  color:white;
  outline:none;
  transition:.3s;
  font-size:15px;
}

textarea:focus{
  border-color:#6366f1;
  box-shadow:0 0 20px rgba(99,102,241,.3);
}

.option{
  margin-top:16px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:16px;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.option span{
  color:#e2e8f0;
}

.switch{
  position:relative;
  width:55px;
  height:30px;
}

.switch input{
  display:none;
}

.slider{
  position:absolute;
  inset:0;
  background:#1e293b;
  border-radius:30px;
  cursor:pointer;
  transition:.3s;
}

.slider::before{
  content:'';
  width:22px;
  height:22px;
  position:absolute;
  top:4px;
  left:4px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

.switch input:checked + .slider{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.switch input:checked + .slider::before{
  transform:translateX(25px);
}

.btn{
  width:100%;
  margin-top:24px;
  padding:18px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 30px rgba(99,102,241,.4);
}

.btn:hover{
  transform:translateY(-3px) scale(1.01);
  box-shadow:0 15px 40px rgba(99,102,241,.5);
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:20px;
}

.stat-box{
  padding:25px;
  border-radius:22px;
  text-align:center;
  background:rgba(15,23,42,.75);
  border:1px solid rgba(255,255,255,.08);
}

.stat-box h2{
  font-size:38px;
  margin-bottom:8px;
}

.stat-box p{
  color:#94a3b8;
  font-size:14px;
}

.right-panel{
  padding:25px;
}

.progress-title{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
  color:#cbd5e1;
}

.progress-bar{
  width:100%;
  height:10px;
  background:#020617;
  border-radius:30px;
  overflow:hidden;
  margin-bottom:25px;
}

.progress-fill{
  width:0%;
  height:100%;
  background:linear-gradient(to right,#2563eb,#8b5cf6);
  transition:.3s;
}

.actions{
  display:flex;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.action-btn{
  padding:12px 18px;
  border:none;
  border-radius:14px;
  background:#111827;
  color:white;
  cursor:pointer;
  transition:.3s;
  border:1px solid rgba(255,255,255,.05);
}

.action-btn:hover{
  background:#1e293b;
}

.table-wrap{
  overflow:auto;
}

.table{
  width:100%;
  border-collapse:collapse;
  min-width:1000px;
}

.table thead{
  background:rgba(255,255,255,.03);
}

.table th{
  text-align:left;
  padding:18px;
  color:#94a3b8;
  font-size:14px;
}

.table td{
  padding:22px 18px;
  border-top:1px solid rgba(255,255,255,.05);
}

.table tbody tr{
  transition:.2s;
}

.table tbody tr:hover{
  background:rgba(255,255,255,.03);
}

.domain{
  font-size:18px;
  font-weight:700;
}

.small{
  color:#64748b;
  margin-top:5px;
  font-size:12px;
}

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 14px;
  border-radius:12px;
  font-size:13px;
  font-weight:700;
}

.ok{
  background:#052e16;
  color:#4ade80;
  border:1px solid #166534;
}

.error{
  background:#450a0a;
  color:#f87171;
  border:1px solid #991b1b;
}

@media(max-width:1100px){

  .grid{
    grid-template-columns:1fr;
  }

  .title{
    font-size:42px;
  }
}
</style>
</head>
<body>

<div class="container">

  <div class="top">
    <h1 class="title">DNS Records Checker</h1>

    <p class="subtitle">
      SPF • MX • DMARC Bulk Scanner
    </p>
  </div>

  <div class="grid">

    <div>

      <div class="card left-panel">

        <div class="label">
          🌐 Domains (one per line)
        </div>

<textarea id="domains">google.com
facebook.com
yahoo.com
microsoft.com</textarea>

        <div class="option">
          <span>🛡️ Check SPF Records</span>

          <label class="switch">
            <input type="checkbox" id="spfToggle" checked>
            <span class="slider"></span>
          </label>
        </div>

        <div class="option">
          <span>📧 Check MX Records</span>

          <label class="switch">
            <input type="checkbox" id="mxToggle" checked>
            <span class="slider"></span>
          </label>
        </div>

        <div class="option">
          <span>🛡️ Check DMARC Records</span>

          <label class="switch">
            <input type="checkbox" id="dmarcToggle" checked>
            <span class="slider"></span>
          </label>
        </div>

        <button class="btn" onclick="checkRecords()">
          Check Records ⚡
        </button>

      </div>

      <div class="stats">

        <div class="stat-box">
          <h2 id="domainsCount">0</h2>
          <p>DOMAINS</p>
        </div>

        <div class="stat-box">
          <h2 id="successCount" style="color:#4ade80;">0</h2>
          <p>SUCCESS</p>
        </div>

      </div>

    </div>

    <div class="card right-panel">

      <div class="progress-title">
        <span>Scanning Progress</span>
        <span id="progressText">0%</span>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="actions">

        <button class="action-btn" onclick="copyResults()">
          📋 Copy Results
        </button>

        <button class="action-btn" onclick="downloadCSV()">
          ⬇ Download CSV
        </button>

      </div>

      <div class="table-wrap">

        <table class="table">

          <thead>
            <tr>
              <th>DOMAIN</th>
              <th>SPF RECORD</th>
              <th>MX RECORDS</th>
              <th>DMARC RECORD</th>
              <th>STATUS</th>
            </tr>
          </thead>

          <tbody id="resultsBody"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script>
const resultsBody =
  document.getElementById('resultsBody');

const progressFill =
  document.getElementById('progressFill');

const progressText =
  document.getElementById('progressText');

const domainsCount =
  document.getElementById('domainsCount');

const successCount =
  document.getElementById('successCount');

async function getDNS(domain,type){

  try{

    const response = await fetch(
      `https://dns.google/resolve?name=${domain}&type=${type}`
    );

    const data = await response.json();

    return data.Answer || [];

  }catch(err){

    return [];
  }
}

async function checkRecords(){

  resultsBody.innerHTML = '';

  const domains =
    document
      .getElementById('domains')
      .value
      .split('\n')
      .map(d => d.trim())
      .filter(Boolean);

  const checkSPF =
    document.getElementById('spfToggle').checked;

  const checkMX =
    document.getElementById('mxToggle').checked;

  const checkDMARC =
    document.getElementById('dmarcToggle').checked;

  domainsCount.innerText = domains.length;

  let success = 0;

  for(let i=0;i<domains.length;i++){

    const domain = domains[i];

    let spfResult = '-';
    let mxResult = '-';
    let dmarcResult = '-';

    let status = 'ERROR';
    let statusClass = 'error';

    if(checkSPF){

      const txtRecords =
        await getDNS(domain,'TXT');

      const spf =
        txtRecords.find(r =>
          r.data
            .replace(/"/g,'')
            .toLowerCase()
            .includes('v=spf1')
        );

      if(spf){

        spfResult =
          spf.data.replace(/"/g,'');
      }
    }

    if(checkMX){

      const mxRecords =
        await getDNS(domain,'MX');

      if(mxRecords.length > 0){

        mxResult =
          mxRecords
            .map(mx => mx.data)
            .join('<br>');
      }
    }

    if(checkDMARC){

      const dmarcRecords =
        await getDNS(`_dmarc.${domain}`,'TXT');

      const dmarc =
        dmarcRecords.find(r =>
          r.data
            .replace(/"/g,'')
            .toLowerCase()
            .includes('v=dmarc1')
        );

      if(dmarc){

        dmarcResult =
          dmarc.data.replace(/"/g,'');
      }
    }

    if(
      spfResult !== '-' ||
      mxResult !== '-' ||
      dmarcResult !== '-'
    ){

      status = 'OK';
      statusClass = 'ok';

      success++;
    }

    successCount.innerText = success;

    progressFill.style.width =
      `${((i+1)/domains.length)*100}%`;

    progressText.innerText =
      `${Math.floor(((i+1)/domains.length)*100)}%`;

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>
        <div class="domain">${domain}</div>

        <div class="small">
          ${Math.floor(Math.random()*40)+10}ms
        </div>
      </td>

      <td>${spfResult}</td>

      <td>${mxResult}</td>

      <td>${dmarcResult}</td>

      <td>
        <span class="badge ${statusClass}">
          ${status}
        </span>
      </td>
    `;

    resultsBody.appendChild(tr);
  }
}

function copyResults(){

  const rows =
    document.querySelectorAll('#resultsBody tr');

  let text =
    'DOMAIN | SPF | MX | DMARC | STATUS\n\n';

  rows.forEach(row => {

    const cols =
      row.querySelectorAll('td');

    const domain =
      cols[0].querySelector('.domain').innerText;

    const spf =
      cols[1].innerText;

    const mx =
      cols[2].innerText.replace(/\n/g,', ');

    const dmarc =
      cols[3].innerText;

    const status =
      cols[4].innerText;

    text +=
      `${domain} | ${spf} | ${mx} | ${dmarc} | ${status}\n`;
  });

  navigator.clipboard.writeText(text);

  alert('Results copied successfully');
}

function downloadCSV(){

  const rows =
    document.querySelectorAll('#resultsBody tr');

  let csv =
    'Domain,SPF Record,MX Records,DMARC Record,Status\n';

  rows.forEach(row => {

    const cols =
      row.querySelectorAll('td');

    const domain =
      cols[0].querySelector('.domain').innerText;

    const spf =
      cols[1].innerText.replace(/,/g,' ');

    const mx =
      cols[2].innerText
        .replace(/\n/g,' | ')
        .replace(/,/g,' ');

    const dmarc =
      cols[3].innerText.replace(/,/g,' ');

    const status =
      cols[4].innerText;

    csv +=
      `"${domain}","${spf}","${mx}","${dmarc}","${status}"\n`;
  });

  const blob =
    new Blob([csv],{
      type:'text/csv'
    });

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement('a');

  a.href = url;

  a.download =
    'dns-results.csv';

  a.click();

  URL.revokeObjectURL(url);
}

checkRecords();
</script>

</body>
</html>
