<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DNS Records Checker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:#fff;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

/* LEFT PANEL */
.left{
  width:320px;
  background:#111827;
  padding:15px;
  border-radius:12px;
}

textarea{
  width:100%;
  height:180px;
  background:#0b1220;
  border:1px solid #1f2937;
  color:#fff;
  padding:10px;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#2563eb;
  border:none;
  color:#fff;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

.toggle{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  padding:10px;
  background:#0b1220;
  border-radius:8px;
}

/* RIGHT */
.right{
  flex:1;
  background:#111827;
  padding:15px;
  border-radius:12px;
}

.progress{
  height:8px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
}

.bar{
  height:100%;
  width:0%;
  background:#3b82f6;
  transition:0.3s;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #1f2937;
  text-align:left;
  font-size:14px;
}

.ok{
  color:#22c55e;
  font-weight:bold;
}

.bad{
  color:#ef4444;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
  <h3>Domains</h3>

  <textarea id="domains">google.com
github.com
vercel.com</textarea>

  <div class="toggle">
    <span>Check SPF</span>
    <input type="checkbox" id="spf" checked>
  </div>

  <div class="toggle">
    <span>Check MX</span>
    <input type="checkbox" id="mx" checked>
  </div>

  <button onclick="checkDNS()">Check Records ⚡</button>
</div>

<!-- RIGHT -->
<div class="right">

  <h3>Results</h3>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Domain</th>
        <th>SPF</th>
        <th>MX</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>

</div>

</div>

<script>

async function fetchDNS(domain, type){
  try{
    let res = await fetch(`https://dns.google/resolve?name=${domain}&type=${type}`);
    let data = await res.json();

    if(data.Answer){
      return data.Answer.map(a => a.data).join(", ");
    }
    return null;
  }catch(e){
    return null;
  }
}

async function checkDNS(){

  let domains = document.getElementById("domains").value.split("\n").filter(d=>d);
  let spfCheck = document.getElementById("spf").checked;
  let mxCheck = document.getElementById("mx").checked;

  let table = document.getElementById("results");
  table.innerHTML = "";

  let bar = document.getElementById("bar");
  let total = domains.length;

  for(let i=0;i<domains.length;i++){

    let domain = domains[i].trim();

    let spf = spfCheck ? await fetchDNS(domain,"TXT") : "OFF";
    let mx = mxCheck ? await fetchDNS(domain,"MX") : "OFF";

    let ok = (spf || mx) ? "OK" : "ERROR";

    let row = `
      <tr>
        <td>${domain}</td>
        <td>${spf || "-"}</td>
        <td>${mx || "-"}</td>
        <td class="${ok==='OK'?'ok':'bad'}">${ok}</td>
      </tr>
    `;

    table.innerHTML += row;

    bar.style.width = ((i+1)/total)*100 + "%";
  }
}

</script>

</body>
</html>
