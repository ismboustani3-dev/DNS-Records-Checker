```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TEAM SYSTEM PRO MAX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{background:#0b1220;color:white;display:flex}

/* SIDEBAR */
.sidebar{
  width:240px;height:100vh;background:#0f172a;
  padding:20px;position:fixed;display:flex;flex-direction:column
}
.logo{font-size:20px;font-weight:bold;margin-bottom:20px}
.menu{flex:1}
.menu div{
  padding:12px;margin:8px 0;border-radius:10px;
  cursor:pointer;color:#9ca3af
}
.menu div:hover{background:#1f2937;color:white}
.logout{
  padding:12px;margin-top:auto;border-radius:10px;
  cursor:pointer;background:#1f2937;color:#ef4444;text-align:center
}
.logout:hover{background:#dc2626;color:white}

/* MAIN */
.main{margin-left:240px;padding:20px;width:100%}
.box{background:#111827;padding:20px;border-radius:12px;margin-top:15px}
input{
  width:100%;padding:10px;margin:5px 0;border:none;
  border-radius:8px;background:#0f172a;color:white
}
button{
  padding:8px 12px;background:#2563eb;border:none;
  border-radius:8px;color:white;cursor:pointer;margin-top:5px
}
.card{
  background:#0f172a;padding:12px;margin-top:10px;
  border-radius:10px
}
.section{display:none}
.section.active{display:block}
.small-btn{
  background:#ef4444;padding:4px 8px;margin-top:5px;
  border-radius:6px;font-size:12px
}
.edit-btn{background:#22c55e;margin-left:5px}
.search{margin-top:10px}
.user-title{margin-top:15px;font-size:18px}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">TEAM SYSTEM PRO MAX</div>

  <div class="menu">
    <div onclick="UI.show('dashboard')">📊 Dashboard</div>
    <div onclick="UI.show('users')">👥 Users</div>
    <div onclick="UI.show('projects')">📁 Projects</div>
  </div>

  <div class="logout" id="logoutBtn">🚪 Logout</div>
</div>

<div class="main">

<div id="dashboard" class="section active">
  <h2>Dashboard</h2>
  <div id="stats"></div>
</div>

<div id="users" class="section">
  <h2>Users</h2>
  <div class="box">
    <input id="uName" placeholder="username">
    <button onclick="App.addUser()">Add</button>
    <div id="userList"></div>
  </div>
</div>

<div id="projects" class="section">
  <h2>Projects</h2>

  <div class="box">
    <input id="username" placeholder="username">
    <input id="object" placeholder="project name">
    <input id="link" placeholder="link">
    <button onclick="App.addProject()">Add</button>

    <input id="search" class="search" placeholder="🔍 search...">

    <div id="projectList"></div>
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();

/* DOM */
const DOM = {
  uName: document.getElementById("uName"),
  username: document.getElementById("username"),
  object: document.getElementById("object"),
  link: document.getElementById("link"),
  userList: document.getElementById("userList"),
  projectList: document.getElementById("projectList"),
  logoutBtn: document.getElementById("logoutBtn"),
  stats: document.getElementById("stats"),
  search: document.getElementById("search")
};

/* APP */
const App = {

  addUser: async function(){
    if(!DOM.uName.value) return;

    await addDoc(collection(db,"users"),{
      name: DOM.uName.value
    });

    DOM.uName.value="";
    loadAll();
  },

  addProject: async function(){
    if(!DOM.username.value || !DOM.object.value || !DOM.link.value) return;

    const usersSnap = await getDocs(collection(db,"users"));
    let userId=null;

    usersSnap.forEach(u=>{
      if(u.data().name === DOM.username.value){
        userId = u.id;
      }
    });

    if(!userId){
      alert("User not found");
      return;
    }

    await addDoc(collection(db,"users",userId,"projects"),{
      object: DOM.object.value,
      link: DOM.link.value,
      createdAt: Date.now()
    });

    DOM.username.value="";
    DOM.object.value="";
    DOM.link.value="";
    loadAll();
  },

  deleteProject: async function(uid,pid){
    await deleteDoc(doc(db,"users",uid,"projects",pid));
    loadAll();
  },

  editProject: async function(uid,pid){
    let val = prompt("New name:");
    if(!val) return;

    await updateDoc(doc(db,"users",uid,"projects",pid),{
      object: val
    });

    loadAll();
  },

  logout: function(){
    signOut(auth);
  }
};

/* UI */
const UI = {
  show: function(page){
    document.querySelectorAll(".section")
      .forEach(s=>s.classList.remove("active"));

    document.getElementById(page).classList.add("active");
  }
};

/* AUTH */
onAuthStateChanged(auth,user=>{
  if(!user){
    let email = prompt("Email:");
    let pass = prompt("Password:");

    signInWithEmailAndPassword(auth,email,pass)
      .catch(()=> alert("Login failed"));
  }
});

/* LOAD EVERYTHING */
async function loadAll(){

  DOM.projectList.innerHTML="";
  DOM.userList.innerHTML="";
  let total = 0;

  const usersSnap = await getDocs(collection(db,"users"));

  for(const user of usersSnap.docs){

    let u = user.data();

    DOM.userList.innerHTML += `<div class="card">👤 ${u.name}</div>`;

    DOM.projectList.innerHTML += `
      <div class="card">
        <div class="user-title">👤 ${u.name}</div>
        <div id="u-${user.id}"></div>
      </div>
    `;

    const projSnap = await getDocs(collection(db,"users",user.id,"projects"));

    projSnap.forEach(p=>{
      total++;

      let d = p.data();

      document.getElementById(`u-${user.id}`).innerHTML += `
        <div style="margin-top:8px;padding:8px;background:#111827;border-radius:8px">
          🧠 ${d.object}<br>
          🔗 <a href="${d.link}" target="_blank">Open</a><br>
          <button onclick="App.deleteProject('${user.id}','${p.id}')">❌</button>
          <button class="edit-btn" onclick="App.editProject('${user.id}','${p.id}')">✏️</button>
        </div>
      `;
    });
  }

  DOM.stats.innerHTML = `<p>Total Projects: ${total}</p>`;
}

/* SEARCH */
DOM.search.addEventListener("input", e=>{
  let val = e.target.value.toLowerCase();

  document.querySelectorAll("#projectList .card")
    .forEach(c=>{
      c.style.display =
        c.innerText.toLowerCase().includes(val)
        ? "block" : "none";
    });
});

/* INIT */
loadAll();

window.App = App;
window.UI = UI;

</script>

</body>
</html>
